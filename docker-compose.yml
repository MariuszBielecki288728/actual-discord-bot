services:
  bot:
    build: .
    volumes:
      - .:/app
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - ACTUAL_URL=http://actual_server:5006
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_FILE=${ACTUAL_FILE}
      - ACTUAL_ACCOUNT=${ACTUAL_ACCOUNT:-Pekao}
      - DISCORD_BANK_NOTIFICATION_CHANNEL=${DISCORD_BANK_NOTIFICATION_CHANNEL}
      - DISCORD_RECEIPT_CHANNEL=${DISCORD_RECEIPT_CHANNEL:-}
      - OCR_PROVIDER=${OCR_PROVIDER:-tesseract}

    command: python -u actual_discord_bot/bot.py

  actual_server:
    image: docker.io/actualbudget/actual-server:26.4.0
    ports:
      - '12012:5006'
    volumes:
      - ./actual-data:/data
    restart: unless-stopped

  test_actual_server:
    image: docker.io/actualbudget/actual-server:26.4.0
    ports:
      - '12013:5006'
    profiles:
      - testing

  integration_tests:
    build:
      context: .
      target: testing
    depends_on:
      - test_actual_server
    environment:
      - ACTUAL_TEST_URL=http://test_actual_server:5006
    command: pytest tests/integration_tests/ -v
    profiles:
      - testing
